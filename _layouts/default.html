<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">

  {% include head.html %}

  <body>
    {% assign current_lang = page.lang | default: "en" %}
    {% assign skip_label = "Skip to content" %}
    {% if current_lang == "pl" %}
      {% assign skip_label = "Przejdź do treści" %}
    {% endif %}
    <a class="skip-link" href="#content">{{ skip_label }}</a>

    <div class="Margins">
      {% include header.html %}

      <main id="content" class="PaperContent">
        {{ content }}
      </main>

      {% include footer.html %}
    </div>

    <script>
      (function () {
        var toggle = document.getElementById("nav-toggle");
        var nav = document.getElementById("site-nav-menu");

        if (!toggle || !nav) {
          return;
        }

        var mq = window.matchMedia("(max-width: 640px)");

        function setOpenState(isOpen) {
          nav.classList.toggle("is-open", isOpen);
          toggle.setAttribute("aria-expanded", String(isOpen));
          var openLabel = toggle.getAttribute("data-open-label") || "Open menu";
          var closeLabel = toggle.getAttribute("data-close-label") || "Close menu";
          toggle.setAttribute("aria-label", isOpen ? closeLabel : openLabel);
        }

        setOpenState(false);

        toggle.addEventListener("click", function () {
          var currentlyOpen = toggle.getAttribute("aria-expanded") === "true";
          setOpenState(!currentlyOpen);
        });

        nav.addEventListener("click", function (event) {
          if (!mq.matches) {
            return;
          }
          if (event.target && event.target.classList.contains("nav-link")) {
            setOpenState(false);
          }
        });

        window.addEventListener("resize", function () {
          if (!mq.matches) {
            setOpenState(false);
          }
        });
      })();
    </script>

    <script>
      (function () {
        var key = "mf-theme";
        var root = document.documentElement;
        var button = document.getElementById("theme-toggle");

        function getInitialTheme() {
          try {
            var stored = localStorage.getItem(key);
            if (stored === "dark" || stored === "light") {
              return stored;
            }
          } catch (error) {
            return "light";
          }

          if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            return "dark";
          }
          return "light";
        }

        function setTheme(theme) {
          root.setAttribute("data-theme", theme);
          try {
            localStorage.setItem(key, theme);
          } catch (error) {
            // Ignore storage failures.
          }

          if (!button) {
            return;
          }

          var isDark = theme === "dark";
          button.setAttribute("aria-pressed", String(isDark));

          var isPolish = root.lang === "pl";
          var nextMode = isDark ? "light" : "dark";
          var titleText = isPolish
            ? (nextMode === "dark" ? "Przełącz na tryb ciemny" : "Przełącz na tryb jasny")
            : (nextMode === "dark" ? "Switch to dark mode" : "Switch to light mode");

          button.setAttribute("aria-label", titleText);
          button.setAttribute("title", titleText);
        }

        var currentTheme = getInitialTheme();
        setTheme(currentTheme);

        if (button) {
          button.addEventListener("click", function () {
            currentTheme = currentTheme === "dark" ? "light" : "dark";
            setTheme(currentTheme);
          });
        }
      })();
    </script>
  </body>

</html>
